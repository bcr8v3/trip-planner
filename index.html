<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner</title>
    <!-- Bootstrap CSS (kept for modal functionality) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           DESIGN SYSTEM VARIABLES
           ========================================= */
        :root {
            --color-primary: #1B3A5C;
            --color-accent: #2563EB;
            --color-bg: #F4F6F9;
            --color-surface: #FFFFFF;
            --color-border: #D1D9E0;
            --color-text: #1A202C;
            --color-muted: #6B7280;

            --color-arrival-bg: #ECFDF5;
            --color-arrival-border: #10B981;
            --color-arrival-text: #065F46;

            --color-activity-bg: #EFF6FF;
            --color-activity-border: #3B82F6;
            --color-activity-text: #1E40AF;

            --color-departure-bg: #FEF2F2;
            --color-departure-border: #EF4444;
            --color-departure-text: #991B1B;

            --radius-input: 8px;
            --radius-card: 12px;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-elevated: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
        }

        /* =========================================
           RESET & BASE
           ========================================= */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Override Bootstrap defaults */
        .btn {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-weight: 500;
            border-radius: var(--radius-input);
            transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
        }

        .form-control, .form-select {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            border-radius: var(--radius-input);
            border-color: var(--color-border);
            color: var(--color-text);
            font-size: 0.9rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-text);
            margin-bottom: 6px;
        }

        /* =========================================
           LOADING SPINNER
           ========================================= */
        .spinner-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(244, 246, 249, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(2px);
        }

        .spinner-overlay.show {
            display: flex;
        }

        .spinner-border {
            color: var(--color-accent) !important;
            width: 2.5rem;
            height: 2.5rem;
        }

        /* =========================================
           LOGIN SCREEN
           ========================================= */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: 24px;
        }

        .login-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-elevated);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
        }

        .login-icon {
            width: 48px;
            height: 48px;
            background: var(--color-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #fff;
            font-size: 1.4rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            text-align: center;
            margin: 0 0 6px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--color-muted);
            text-align: center;
            margin: 0 0 28px;
        }

        /* =========================================
           BUTTONS
           ========================================= */
        .btn-navy {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }

        .btn-navy:hover, .btn-navy:focus {
            background-color: #142d48;
            border-color: #142d48;
            color: #fff;
        }

        .btn-navy:disabled {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            opacity: 0.5;
            color: #fff;
        }

        .btn-accent {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
            color: #fff;
        }

        .btn-accent:hover, .btn-accent:focus {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
            color: #fff;
        }

        .btn-outline-default {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text);
        }

        .btn-outline-default:hover {
            background: var(--color-bg);
            border-color: #b0bec5;
            color: var(--color-text);
        }

        .btn-arrival {
            background-color: var(--color-arrival-bg);
            border: 1.5px solid var(--color-arrival-border);
            color: var(--color-arrival-text);
            font-weight: 600;
        }

        .btn-arrival:hover {
            background-color: #d1fae5;
            border-color: #059669;
            color: var(--color-arrival-text);
        }

        .btn-activity {
            background-color: var(--color-activity-bg);
            border: 1.5px solid var(--color-activity-border);
            color: var(--color-activity-text);
            font-weight: 600;
        }

        .btn-activity:hover {
            background-color: #dbeafe;
            border-color: #2563eb;
            color: var(--color-activity-text);
        }

        .btn-departure {
            background-color: var(--color-departure-bg);
            border: 1.5px solid var(--color-departure-border);
            color: var(--color-departure-text);
            font-weight: 600;
        }

        .btn-departure:hover {
            background-color: #fee2e2;
            border-color: #dc2626;
            color: var(--color-departure-text);
        }

        /* =========================================
           MAIN LAYOUT
           ========================================= */
        #mainContent {
            min-height: 100vh;
            background: var(--color-bg);
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        /* =========================================
           PAGE HEADER (Trip Selection)
           ========================================= */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .page-header-left h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-text);
            margin: 0 0 4px;
        }

        .page-header-left p {
            font-size: 0.875rem;
            color: var(--color-muted);
            margin: 0;
        }

        .page-header-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* =========================================
           TRIPS GRID
           ========================================= */
        .trips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .trip-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 24px;
            transition: box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .trip-card:hover {
            box-shadow: var(--shadow-elevated);
            border-color: #b0bec5;
        }

        .trip-card-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-text);
            margin: 0 0 6px;
        }

        .trip-card-dates {
            font-size: 0.85rem;
            color: var(--color-muted);
            margin: 0 0 16px;
        }

        .trip-card-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .stat-badge.arrival {
            background: var(--color-arrival-bg);
            color: var(--color-arrival-text);
            border: 1px solid #a7f3d0;
        }

        .stat-badge.activity {
            background: var(--color-activity-bg);
            color: var(--color-activity-text);
            border: 1px solid #bfdbfe;
        }

        .stat-badge.departure {
            background: var(--color-departure-bg);
            color: var(--color-departure-text);
            border: 1px solid #fecaca;
        }

        .trip-card-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 64px 24px;
            color: var(--color-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-text);
            margin: 0 0 8px;
        }

        .empty-state p {
            font-size: 0.9rem;
            margin: 0 0 24px;
        }

        /* =========================================
           TRIP DETAIL HEADER
           ========================================= */
        .detail-header {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .detail-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-input);
            color: var(--color-text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .back-button:hover {
            background: var(--color-bg);
            border-color: #b0bec5;
        }

        #tripTitle {
            line-height: 1.2;
        }

        #tripTitle .trip-name {
            display: block;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-text);
        }

        #tripTitle .trip-dates {
            display: block;
            font-size: 0.85rem;
            color: var(--color-muted);
            margin-top: 2px;
        }

        .detail-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Save button with unsaved dot */
        .save-btn-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        #unsavedDot {
            display: none;
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            background: #F59E0B;
            border-radius: 50%;
            border: 2px solid var(--color-surface);
            z-index: 1;
        }

        /* =========================================
           ADD EVENT SECTION
           ========================================= */
        .add-event-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .add-event-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--color-muted);
            margin: 0 0 14px;
        }

        .event-type-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .event-type-buttons .btn {
            font-size: 0.875rem;
            padding: 8px 18px;
        }

        /* Event form: shown as grid by JS */
        #eventForm {
            display: none;
            padding-top: 16px;
            margin-top: 16px;
            border-top: 1px solid var(--color-border);
            gap: 14px;
            grid-template-columns: 1fr;
        }

        #eventForm .form-control {
            width: 100%;
        }

        /* Input group overrides */
        .input-group .form-control {
            border-radius: var(--radius-input) 0 0 var(--radius-input) !important;
        }

        .input-group .input-group-text {
            border-radius: 0 var(--radius-input) var(--radius-input) 0 !important;
            background: var(--color-bg);
            border-color: var(--color-border);
            color: var(--color-muted);
            cursor: pointer;
        }

        .event-form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-form-header .form-label {
            margin: 0;
        }

        .collapse-btn {
            background: none;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            color: var(--color-muted);
            border-radius: 6px;
            font-size: 1.1rem;
            line-height: 1;
            transition: background 0.15s, color 0.15s;
        }

        .collapse-btn:hover {
            background: var(--color-bg);
            color: var(--color-text);
        }

        /* =========================================
           CALENDAR GRID
           ========================================= */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .day-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: 18px 20px;
            transition: box-shadow 0.15s;
        }

        .day-card:hover {
            box-shadow: var(--shadow-elevated);
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--color-border);
        }

        .event {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            border-left-width: 3px;
            border-left-style: solid;
        }

        .event:last-child {
            margin-bottom: 0;
        }

        .event.arrival {
            background: var(--color-arrival-bg);
            border-color: var(--color-arrival-border);
            color: var(--color-arrival-text);
        }

        .event.activity {
            background: var(--color-activity-bg);
            border-color: var(--color-activity-border);
            color: var(--color-activity-text);
        }

        .event.departure {
            background: var(--color-departure-bg);
            border-color: var(--color-departure-border);
            color: var(--color-departure-text);
        }

        .event-delete-btn {
            background: none;
            border: none;
            padding: 0 4px;
            cursor: pointer;
            opacity: 0.5;
            font-size: 1.1rem;
            line-height: 1;
            margin-left: 8px;
            flex-shrink: 0;
            transition: opacity 0.15s;
            color: inherit !important;
        }

        .event-delete-btn:hover {
            opacity: 1;
        }

        .no-events {
            font-size: 0.825rem;
            color: var(--color-muted);
            font-style: italic;
            padding: 4px 0;
        }

        /* =========================================
           MODALS
           ========================================= */
        .modal-content {
            border-radius: var(--radius-card);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-elevated);
        }

        .modal-header {
            border-bottom: 1px solid var(--color-border);
            padding: 20px 24px 16px;
        }

        .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--color-text);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            border-top: 1px solid var(--color-border);
            padding: 16px 24px;
        }

        .modal-body .mb-3 {
            margin-bottom: 16px !important;
        }

        /* =========================================
           TOAST NOTIFICATIONS
           ========================================= */
        #toastContainer {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-elevated);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text);
            pointer-events: all;
            max-width: 360px;
            animation: toastIn 0.25s ease;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .toast-item.toast-out {
            opacity: 0;
            transform: translateY(8px);
        }

        .toast-item .toast-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .toast-item.toast-success .toast-icon {
            background: #d1fae5;
            color: #065f46;
        }

        .toast-item.toast-error .toast-icon {
            background: #fee2e2;
            color: #991b1b;
        }

        .toast-item.toast-info .toast-icon {
            background: #dbeafe;
            color: #1e40af;
        }

        .toast-item.toast-success { border-left: 3px solid #10b981; }
        .toast-item.toast-error   { border-left: 3px solid #ef4444; }
        .toast-item.toast-info    { border-left: 3px solid #3b82f6; }

        /* =========================================
           FLATPICKR OVERRIDES
           ========================================= */
        .flatpickr-calendar {
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--color-border);
            font-family: 'Inter', system-ui, sans-serif;
        }

        .flatpickr-day.selected {
            background: var(--color-accent);
            border-color: var(--color-accent);
        }

        /* =========================================
           RESPONSIVE
           ========================================= */
        @media (max-width: 640px) {
            .app-container {
                padding: 16px 14px;
            }

            .detail-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .detail-header-right {
                width: 100%;
                justify-content: flex-start;
            }

            .calendar-grid {
                grid-template-columns: 1fr;
            }

            .trips-grid {
                grid-template-columns: 1fr;
            }

            .event-type-buttons {
                flex-direction: column;
            }

            .event-type-buttons .btn {
                width: 100%;
            }

            .login-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Spinner -->
    <div id="spinner" class="spinner-overlay">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-icon">
                <i class="bi bi-globe2"></i>
            </div>
            <h1 class="login-title">Travel Planner</h1>
            <p class="login-subtitle">Enter your access key to continue</p>
            <form id="loginForm" name="login" autocomplete="off">
                <div class="mb-3">
                    <label for="keyInput" class="form-label">Access Key</label>
                    <input type="password" class="form-control" id="keyInput" placeholder="Enter your access key" required>
                </div>
                <div class="mb-4">
                    <div class="g-recaptcha" data-sitekey="6LfkRIEsAAAAANvE6QSIGXViID4pbAeJdmdnpIiL"></div>
                </div>
                <button type="submit" class="btn btn-navy w-100" style="padding: 10px;">Sign In</button>
            </form>
        </div>
    </div>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <!-- Main Content -->
    <div id="mainContent" style="display: none;">
        <div class="app-container">

            <!-- Trip Selection View (Master only) -->
            <div id="tripSelection">
                <div class="page-header">
                    <div class="page-header-left">
                        <h1>Your Trips</h1>
                        <p>Manage and view all your planned trips</p>
                    </div>
                    <div class="page-header-right">
                        <button class="btn btn-navy" onclick="showNewTripForm()">
                            <i class="bi bi-plus-lg me-1"></i> New Trip
                        </button>
                        <button class="btn btn-outline-default" onclick="logout()">
                            <i class="bi bi-box-arrow-right me-1"></i> Logout
                        </button>
                    </div>
                </div>
                <div id="tripsList" class="trips-grid"></div>
            </div>

            <!-- Trip Detail View -->
            <div id="tripContent" style="display: none;">

                <!-- Detail Header -->
                <div class="detail-header">
                    <div class="detail-header-left">
                        <button id="backToTripsBtn" class="back-button">
                            <i class="bi bi-arrow-left"></i> Back
                        </button>
                        <div id="tripTitle">
                            <span class="trip-name">Trip Details</span>
                        </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="exportdata.js"></script>
    <script>
        let tripData = null;
        let currentTrip = null;
        let isMaster = false;
        let isLoading = false;
        let unsavedChanges = false;
        let lastSavedTripData = null;
        let saveAuthorized = false; // Flag to track when saves are explicitly authorized

        // =========================================
        // TOAST NOTIFICATIONS
        // =========================================
        function showToast(message, type) {
            type = type || 'info';
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast-item toast-' + type;

            const iconMap = { success: '✓', error: '✕', info: 'i' };
            toast.innerHTML =
                '<span class="toast-icon">' + (iconMap[type] || 'i') + '</span>' +
                '<span>' + message + '</span>';

            container.appendChild(toast);

            setTimeout(function() {
                toast.classList.add('toast-out');
                setTimeout(function() {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 300);
            }, 4000);
        }

        // =========================================
        // CONFIRM MODAL
        // =========================================
        function showConfirmModal(title, message, onConfirm) {
            document.getElementById('confirmModalTitle').textContent = title;
            document.getElementById('confirmModalMessage').textContent = message;
            const confirmBtn = document.getElementById('confirmModalConfirmBtn');
            // Clone to remove old listeners
            const newBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
            const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
            newBtn.onclick = function() {
                modal.hide();
                onConfirm();
            };
            modal.show();
        }

        // =========================================
        // DATE PICKERS (initial setup)
        // =========================================
        function initializeDatePickers() {
            flatpickr("#tripStartDate", {
                dateFormat: "Y-m-d",
                allowInput: true
            });
            flatpickr("#tripEndDate", {
                dateFormat: "Y-m-d",
                allowInput: true
            });

            flatpickr("#eventDate", {
                dateFormat: "Y-m-d",
                allowInput: true,
                minDate: currentTrip ? currentTrip.startDate : null,
                maxDate: currentTrip ? currentTrip.endDate : null
            });

            const timeConfig = {
                enableTime: true,
                noCalendar: true,
                dateFormat: "h:i K",
                allowInput: true,
                time_24hr: false,
            };

            flatpickr("#eventTime", timeConfig);
            flatpickr("#eventEndTime", timeConfig);
        }

        // =========================================
        // LOAD DATA
        // =========================================
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Failed to load data');
                tripData = await response.json();
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Error loading data. Please try again later.');
            }
        }

        // =========================================
        // SAVE DATA
        // =========================================
        async function saveData() {
            if (isLoading) return;

            // EMERGENCY DEBUGGING - Find out what's calling this
            console.log('🚨🚨🚨 SAVEDATA CALLED - INVESTIGATING...');
            console.trace('Full call stack for saveData():');

            const saveButton = document.getElementById('saveTripBtn');
            if (saveButton) {
                console.log('Save button exists, disabled state:', saveButton.disabled);
                console.log('Save button text:', saveButton.textContent);
            }

            console.log('Unsaved changes flag:', unsavedChanges);
            console.log('Current trip:', currentTrip?.name || 'None');
            console.log('Is master:', isMaster);
            console.log('Save authorized flag:', saveAuthorized);

            // BLOCK ALL SAVES EXCEPT EXPLICIT USER ACTIONS
            if (!saveAuthorized) {
                console.log('🛑 BLOCKING UNAUTHORIZED SAVE ATTEMPT!');
                console.log('This save was not explicitly authorized by user action');
                console.log('saveAuthorized flag is:', saveAuthorized);
                return;
            }

            // Reset the authorization flag for next time
            saveAuthorized = false;

            console.log('✅ Authorized save proceeding...');
            setLoading(true);

            try {
                console.log('Sending data to server:', JSON.stringify(tripData));
                const response = await fetch('/.netlify/functions/updateData', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ data: tripData })
                });

                console.log('Server response status:', response.status);

                if (!response.ok) {
                    if (response.status === 502) {
                        throw new Error('Server error (502): The Netlify function is not responding correctly. This may be due to misconfiguration or deployment issues.');
                    } else {
                        throw new Error('Server error (' + response.status + '): Failed to save data');
                    }
                }

                const result = await response.json();
                console.log('Server response data:', result);

                if (result.error) {
                    throw new Error(result.error);
                }

                await loadData();
                lastSavedTripData = deepClone(tripData);
                setUnsavedChanges(false);
                showToast('Trip saved successfully!', 'success');
            } catch (error) {
                console.error('Error saving data:', error);
                showToast('Error saving: ' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        }

        // =========================================
        // LOADING STATE
        // =========================================
        function setLoading(loading) {
            isLoading = loading;
            const spinner = document.getElementById('spinner');
            spinner.classList.toggle('show', loading);

            const buttons = document.querySelectorAll('button[type="submit"], button[onclick="createNewTrip()"]');
            buttons.forEach(function(button) {
                button.disabled = loading;
                const originalText = button.getAttribute('data-original-text');
                if (loading && originalText) {
                    button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving...';
                } else if (originalText) {
                    button.innerHTML = originalText;
                }
            });

            const forms = document.querySelectorAll('form');
            forms.forEach(function(form) {
                form.classList.toggle('saving', loading);
            });
        }

        // Show/hide Edit Trip button based on isMaster
        function updateEditTripBtnVisibility() {
            const btn = document.getElementById('editTripDatesBtn');
            if (btn) btn.style.display = isMaster ? 'inline-flex' : 'none';
        }

        // Deep clone helper
        function deepClone(obj) {
            return JSON.parse(JSON.stringify(obj));
        }

        // Mark unsaved changes
        function setUnsavedChanges(state) {
            unsavedChanges = state;
            const saveBtn = document.getElementById('saveTripBtn');
            if (saveBtn) saveBtn.disabled = !unsavedChanges;
            const dot = document.getElementById('unsavedDot');
            if (dot) dot.style.display = state ? 'inline-block' : 'none';
        }

        // Compare currentTrip to lastSavedTripData
        function detectUnsavedChanges() {
            if (!currentTrip || !lastSavedTripData) return false;
            const savedTrip = lastSavedTripData.trips.find(function(t) { return t.id === currentTrip.id; });
            return JSON.stringify(currentTrip) !== JSON.stringify(savedTrip);
        }

        // Ensure Save button is wired up
        function ensureSaveButton() {
            const saveBtn = document.getElementById('saveTripBtn');
            if (saveBtn) {
                saveBtn.onclick = async function() {
                    saveAuthorized = true;
                    await saveData();
                    lastSavedTripData = deepClone(tripData);
                    setUnsavedChanges(false);
                };
            }
        }

        // Call whenever trip detail view is shown
        function setupTripDetailUnsavedLogic() {
            ensureSaveButton();
            setUnsavedChanges(false);
            window.onbeforeunload = function(e) {
                if (unsavedChanges) {
                    e.preventDefault();
                    e.returnValue = '';
                    return '';
                }
            };
        }

        // Mark unsaved changes on any trip edit
        function markTripEdit() {
            console.log('📝 markTripEdit() called - marking changes as unsaved');
            console.trace('Call stack for markTripEdit():');
            setUnsavedChanges(true);
        }

        // =========================================
        // EVENT CRUD
        // =========================================
        async function addArrival(event, data) {
            if (event) event.preventDefault();
            const arrival = data || {
                name: document.getElementById('eventName').value,
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value
            };
            currentTrip.arrivals.push(arrival);
            markTripEdit();
            updateCalendar();
            document.getElementById('eventForm').style.display = 'none';
        }

        async function addActivity(event, data) {
            if (event) event.preventDefault();
            const activity = data || {
                name: document.getElementById('eventName').value,
                date: document.getElementById('eventDate').value,
                startTime: document.getElementById('eventTime').value,
                endTime: document.getElementById('eventEndTime').value || null
            };
            currentTrip.activities.push(activity);
            markTripEdit();
            updateCalendar();
            document.getElementById('eventForm').style.display = 'none';
        }

        async function addDeparture(event, data) {
            if (event) event.preventDefault();
            const departure = data || {
                name: document.getElementById('eventName').value,
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value
            };
            currentTrip.departures.push(departure);
            markTripEdit();
            updateCalendar();
            document.getElementById('eventForm').style.display = 'none';
        }

        function deleteEvent(type, dateStr, idx) {
            if (!currentTrip || !['arrivals','activities','departures'].includes(type)) return;
            let arr = currentTrip[type];
            const eventsForDate = arr.map(function(e, i) { return Object.assign({}, e, {_idx: i}); }).filter(function(e) { return e.date === dateStr; });
            if (idx >= 0 && idx < eventsForDate.length) {
                arr.splice(eventsForDate[idx]._idx, 1);
                markTripEdit();
                updateCalendar();
            }
        }

        function deleteEventSorted(type, dateStr, sortedIdx) {
            if (!currentTrip || !['arrivals','activities','departures'].includes(type)) return;
            let arr = currentTrip[type];
            let sorted;
            const parseTime = function(t) {
                if (!t) return 0;
                const d = new Date('1970-01-01T' + t.replace(/(\d{1,2}):(\d{2}) ([AP]M)/, function(m, h, min, ampm) {
                    let hour = parseInt(h);
                    if (ampm === 'PM' && hour !== 12) hour += 12;
                    if (ampm === 'AM' && hour === 12) hour = 0;
                    return hour.toString().padStart(2, '0') + ':' + min;
                }) + ':00');
                return d.getTime();
            };
            if (type === 'arrivals' || type === 'departures') {
                sorted = arr
                    .map(function(e, i) { return Object.assign({}, e, {_idx: i}); })
                    .filter(function(e) { return e.date === dateStr; })
                    .sort(function(a, b) { return parseTime(a.time) - parseTime(b.time); });
            } else if (type === 'activities') {
                sorted = arr
                    .map(function(e, i) { return Object.assign({}, e, {_idx: i}); })
                    .filter(function(e) { return e.date === dateStr; })
                    .sort(function(a, b) {
                        const aStart = parseTime(a.startTime);
                        const bStart = parseTime(b.startTime);
                        if (aStart !== bStart) return aStart - bStart;
                        return parseTime(a.endTime) - parseTime(b.endTime);
                    });
            }
            if (sortedIdx >= 0 && sortedIdx < sorted.length) {
                arr.splice(sorted[sortedIdx]._idx, 1);
                markTripEdit();
                updateCalendar();
            }
        }

        // =========================================
        // VIEW MANAGEMENT
        // =========================================
        function showTripContent() {
            document.getElementById('tripSelection').style.display = 'none';
            document.getElementById('tripContent').style.display = 'block';
            setupTripDetailUnsavedLogic();
            updateTripTitleWithDates();
            updateEditTripBtnVisibility();
            updateCalendar();
        }

        async function createNewTrip() {
            const tripName = document.getElementById('tripName').value.trim();
            const tripKey = document.getElementById('tripKey').value.trim();
            const tripStartDate = document.getElementById('tripStartDate').value.trim();
            const tripEndDate = document.getElementById('tripEndDate').value.trim();
            if (!tripName || !tripKey || !tripStartDate || !tripEndDate || isNaN(Date.parse(tripStartDate)) || isNaN(Date.parse(tripEndDate))) {
                alert('Please enter a valid trip name, key, start date, and end date.');
                return;
            }
            const timestamp = new Date().getTime();
            const newTrip = {
                id: 'trip_' + timestamp,
                key: tripKey,
                name: tripName,
                startDate: tripStartDate,
                endDate: tripEndDate,
                arrivals: [],
                activities: [],
                departures: []
            };
            tripData.trips.push(newTrip);
            currentTrip = newTrip;
            const modal = bootstrap.Modal.getInstance(document.getElementById('newTripModal'));
            if (modal) modal.hide();
            document.getElementById('newTripForm').reset();
            showTripContent();
            setUnsavedChanges(true);
        }

        function selectTrip(tripId) {
            currentTrip = tripData.trips.find(function(t) { return t.id === tripId; });
            if (currentTrip) {
                showTripContent();
            }
        }

        function updateTripTitleWithDates() {
            if (!currentTrip) return;
            const startDate = new Date(currentTrip.startDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            const endDate = new Date(currentTrip.endDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            document.getElementById('tripTitle').innerHTML =
                '<span class="trip-name">' + currentTrip.name + '</span>' +
                '<span class="trip-dates">' + startDate + ' &mdash; ' + endDate + '</span>';
        }

        // =========================================
        // TRIP EDIT / DELETE
        // =========================================
        function showEditTripModal() {
            if (!currentTrip) return;
            document.getElementById('editTripName').value = currentTrip.name;
            document.getElementById('editTripKey').value = currentTrip.key;
            document.getElementById('editTripStartDate').value = currentTrip.startDate;
            document.getElementById('editTripEndDate').value = currentTrip.endDate;
            flatpickr("#editTripStartDate", { dateFormat: "Y-m-d", allowInput: true });
            flatpickr("#editTripEndDate", { dateFormat: "Y-m-d", allowInput: true });
            const modal = new bootstrap.Modal(document.getElementById('editTripModal'));
            modal.show();
        }

        function showEditTripModalFromList(tripId) {
            const trip = tripData.trips.find(function(t) { return t.id === tripId; });
            if (!trip) return;
            currentTrip = trip;
            document.getElementById('editTripName').value = trip.name;
            document.getElementById('editTripKey').value = trip.key;
            document.getElementById('editTripStartDate').value = trip.startDate;
            document.getElementById('editTripEndDate').value = trip.endDate;
            flatpickr("#editTripStartDate", { dateFormat: "Y-m-d", allowInput: true });
            flatpickr("#editTripEndDate", { dateFormat: "Y-m-d", allowInput: true });
            const modal = new bootstrap.Modal(document.getElementById('editTripModal'));
            modal.show();
            updateTripTitleWithDates();
        }

        async function saveTripEdits() {
            const name = document.getElementById('editTripName').value.trim();
            const key = document.getElementById('editTripKey').value.trim();
            const startDate = document.getElementById('editTripStartDate').value.trim();
            const endDate = document.getElementById('editTripEndDate').value.trim();
            if (!name || !key || !startDate || !endDate || isNaN(Date.parse(startDate)) || isNaN(Date.parse(endDate))) {
                alert('Please enter a valid trip name, key, start date, and end date.');
                return;
            }
            currentTrip.name = name;
            currentTrip.key = key;
            currentTrip.startDate = startDate;
            currentTrip.endDate = endDate;
            markTripEdit();
            updateTripTitleWithDates();
            const modal = bootstrap.Modal.getInstance(document.getElementById('editTripModal'));
            if (modal) modal.hide();
            updateCalendar();
            loadTripsList && loadTripsList();
        }

        async function deleteCurrentTrip() {
            if (!currentTrip) return;
            showConfirmModal(
                'Delete Trip',
                'Are you sure you want to delete "' + currentTrip.name + '"? This cannot be undone.',
                async function() {
                    const idx = tripData.trips.findIndex(function(t) { return t.id === currentTrip.id; });
                    if (idx !== -1) {
                        tripData.trips.splice(idx, 1);
                        document.getElementById('tripContent').style.display = 'none';
                        document.getElementById('tripSelection').style.display = 'block';
                        loadTripsList();
                        saveAuthorized = true;
                        await saveData();
                        currentTrip = null;
                        document.getElementById('editTripModal').classList.remove('show');
                        document.body.classList.remove('modal-open');
                        const backdrop = document.querySelector('.modal-backdrop');
                        if (backdrop) backdrop.remove();
                    }
                }
            );
        }

        // Alert on navigation if unsaved changes
        window.addEventListener('beforeunload', function(e) {
            if (unsavedChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        function enhancedShowTripSelection() {
            if (unsavedChanges) {
                if (!confirm('You have unsaved changes. Leave and discard them?')) return;
                setUnsavedChanges(false);
                loadData().then(function() {
                    lastSavedTripData = deepClone(tripData);
                    showTripSelection();
                });
                return;
            }
            showTripSelection();
        }

        // =========================================
        // LOGIN / LOGOUT
        // =========================================
        async function login() {
            try {
                setLoading(true);
                const recaptchaResponse = grecaptcha.getResponse();
                if (!recaptchaResponse) {
                    alert('Please complete the captcha.');
                    setLoading(false);
                    return;
                }
                const key = document.getElementById('keyInput').value;
                await loadData();
                if (!tripData) {
                    alert('Error loading data. Please try again.');
                    setLoading(false);
                    return;
                }
                if (key === tripData.masterKey) {
                    console.log("Login as master successful");
                    isMaster = true;
                    currentTrip = null;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('tripSelection').style.display = 'block';
                    document.getElementById('tripContent').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    document.getElementById('backToTripsBtn').style.display = 'inline-flex';
                    loadTripsList();
                    updateEditTripBtnVisibility();
                } else {
                    const trip = tripData.trips.find(function(t) { return t.key === key; });
                    if (trip) {
                        console.log('Login as guest for trip "' + trip.name + '" successful');
                        isMaster = false;
                        currentTrip = trip;
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('tripSelection').style.display = 'none';
                        document.getElementById('tripContent').style.display = 'block';
                        document.getElementById('mainContent').style.display = 'block';
                        updateTripTitleWithDates();
                        document.getElementById('backToTripsBtn').style.display = 'none';
                        updateEditTripBtnVisibility();
                        updateCalendar();
                    } else {
                        alert('Invalid access key');
                    }
                }
                grecaptcha.reset();
            } catch (error) {
                console.error("Login error:", error);
                alert('An error occurred during login. Please try again.');
            } finally {
                setLoading(false);
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('keyInput').value = '';
            currentTrip = null;
            isMaster = false;
        }

        // =========================================
        // TRIPS LIST
        // =========================================
        function loadTripsList() {
            const tripsList = document.getElementById('tripsList');
            tripsList.innerHTML = '';

            if (!tripData.trips || tripData.trips.length === 0) {
                tripsList.innerHTML =
                    '<div class="empty-state">' +
                    '  <div class="empty-state-icon"><i class="bi bi-map"></i></div>' +
                    '  <h3>No trips yet</h3>' +
                    '  <p>Get started by creating your first trip.</p>' +
                    '  <button class="btn btn-navy" onclick="showNewTripForm()">' +
                    '    <i class="bi bi-plus-lg me-1"></i> Create your first trip' +
                    '  </button>' +
                    '</div>';
                return;
            }

            tripData.trips.forEach(function(trip) {
                const card = document.createElement('div');
                card.className = 'trip-card';
                const startDate = new Date(trip.startDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                const endDate = new Date(trip.endDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                card.innerHTML =
                    '<p class="trip-card-name">' + trip.name + '</p>' +
                    '<p class="trip-card-dates"><i class="bi bi-calendar3 me-1"></i>' + startDate + ' &mdash; ' + endDate + '</p>' +
                    '<div class="trip-card-stats">' +
                    '  <span class="stat-badge arrival"><i class="bi bi-airplane-fill"></i> ' + trip.arrivals.length + ' Arrivals</span>' +
                    '  <span class="stat-badge activity"><i class="bi bi-calendar-event"></i> ' + trip.activities.length + ' Activities</span>' +
                    '  <span class="stat-badge departure"><i class="bi bi-airplane-fill"></i> ' + trip.departures.length + ' Departures</span>' +
                    '</div>' +
                    '<div class="trip-card-actions">' +
                    '  <button class="btn btn-navy w-100" onclick="selectTrip(\'' + trip.id + '\')">View Trip</button>' +
                    '  <button class="btn btn-outline-default w-100" onclick="showEditTripModalFromList(\'' + trip.id + '\')"><i class="bi bi-pencil me-1"></i>Edit Trip Info</button>' +
                    '</div>';
                tripsList.appendChild(card);
            });
        }

        function showTripSelection() {
            document.getElementById('tripSelection').style.display = 'block';
            document.getElementById('tripContent').style.display = 'none';
            document.getElementById('eventForm').style.display = 'none';
        }

        function showNewTripForm() {
            const modal = new bootstrap.Modal(document.getElementById('newTripModal'));
            modal.show();
            initializeDatePickers();
        }

        function patchTripMutators() {
            // This function can be used to add change tracking to trip modification functions
            // For now, we're using markTripEdit() directly in the add functions
        }

        // =========================================
        // DATE/TIME PICKERS FOR EVENT FORM
        // =========================================
        function setupDateAndTimePickers() {
            if (!currentTrip) return;
            const existingPickers = ['eventDate', 'eventTime', 'eventEndTime'];
            existingPickers.forEach(function(id) {
                const element = document.getElementById(id);
                if (element && element._flatpickr) {
                    element._flatpickr.destroy();
                }
            });

            const eventDateInput = document.getElementById('eventDate');
            const datePicker = flatpickr(eventDateInput, {
                dateFormat: 'Y-m-d',
                allowInput: true,
                minDate: currentTrip.startDate,
                maxDate: currentTrip.endDate,
                clickOpens: true,
                disableMobile: true
            });
            eventDateInput.placeholder = 'YYYY-MM-DD';
            const calendarBtn = eventDateInput.parentElement.querySelector('.input-group-text');
            if (calendarBtn) calendarBtn.onclick = function() { datePicker.open(); };

            const eventTimeInput = document.getElementById('eventTime');
            const timePicker = flatpickr(eventTimeInput, {
                enableTime: true,
                noCalendar: true,
                dateFormat: "h:i K",
                time_24hr: false,
                allowInput: true,
                clickOpens: false,
                minuteIncrement: 5,
                onOpen: function(selectedDates, dateStr, instance) {
                    instance.input.placeholder = "hh:mm";
                },
                onClose: function(selectedDates, dateStr, instance) {
                    if (!instance.input.value) instance.input.placeholder = "Start Time";
                }
            });
            const timeBtn = eventTimeInput.parentElement.querySelector('.input-group-text');
            if (timeBtn) timeBtn.onclick = function() { timePicker.open(); };
            eventTimeInput.onfocus = function() {
                this.placeholder = "hh:mm";
                timePicker.open();
            };
            eventTimeInput.onblur = function() {
                if (!this.value) this.placeholder = "Start Time";
            };

            const eventEndTimeInput = document.getElementById('eventEndTime');
            if (eventEndTimeInput) {
                const endTimePicker = flatpickr(eventEndTimeInput, {
                    enableTime: true,
                    noCalendar: true,
                    dateFormat: "h:i K",
                    time_24hr: false,
                    allowInput: true,
                    clickOpens: false,
                    minuteIncrement: 5,
                    onOpen: function(selectedDates, dateStr, instance) {
                        instance.input.placeholder = "hh:mm";
                    },
                    onClose: function(selectedDates, dateStr, instance) {
                        if (!instance.input.value) instance.input.placeholder = "End Time (optional)";
                    }
                });
                const endTimeBtn = eventEndTimeInput.parentElement.querySelector('.input-group-text');
                if (endTimeBtn) endTimeBtn.onclick = function() { endTimePicker.open(); };
                eventEndTimeInput.onfocus = function() {
                    this.placeholder = "hh:mm";
                    endTimePicker.open();
                };
                eventEndTimeInput.onblur = function() {
                    if (!this.value) this.placeholder = "End Time (optional)";
                };
            }
        }

        // Collapse event form button
        document.addEventListener('DOMContentLoaded', function() {
            const collapseBtn = document.getElementById('collapseEventFormBtn');
            if (collapseBtn) {
                collapseBtn.onclick = function() {
                    document.getElementById('eventForm').style.display = 'none';
                };
            }
        });

        // =========================================
        // EVENT FORM
        // =========================================
        function showEventForm(type) {
            const form = document.getElementById('eventForm');
            const endTimeContainer = document.querySelector('.activity-only');
            const addButton = document.getElementById('addEventButton');
            form.style.display = 'grid';
            if (type === 'activity') {
                endTimeContainer.style.display = 'flex';
            } else {
                endTimeContainer.style.display = 'none';
                document.getElementById('eventEndTime').value = '';
            }
            addButton.textContent = 'Add ' + type.charAt(0).toUpperCase() + type.slice(1);
            // Style button by type
            addButton.className = 'btn btn-' + type;
            setupDateAndTimePickers();
            form.onsubmit = function(e) {
                e.preventDefault();
                const name = document.getElementById('eventName').value.trim();
                const date = document.getElementById('eventDate').value.trim();
                const time = document.getElementById('eventTime').value.trim();
                if (!name || !date || !time || isNaN(Date.parse(date))) {
                    alert('Please enter a valid name, date, and time.');
                    return;
                }
                if (type === 'activity') {
                    const eventData = {
                        name: name,
                        date: date,
                        startTime: time,
                        endTime: document.getElementById('eventEndTime').value || null
                    };
                    addActivity(null, eventData);
                } else if (type === 'arrival') {
                    addArrival(null, { name: name, date: date, time: time });
                } else if (type === 'departure') {
                    addDeparture(null, { name: name, date: date, time: time });
                }
                form.reset();
                if (type !== 'activity') {
                    endTimeContainer.style.display = 'none';
                }
            };
            form.style.display = 'grid';
        }

        // =========================================
        // CALENDAR
        // =========================================
        function updateCalendar() {
            if (!currentTrip) {
                document.getElementById('calendar').innerHTML = '<p class="no-events">Select a trip to view its calendar</p>';
                return;
            }
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            const start = new Date(currentTrip.startDate + 'T00:00:00');
            const end = new Date(currentTrip.endDate + 'T00:00:00');
            const dates = [];
            let date = new Date(start);
            while (date <= end) {
                dates.push(new Date(date));
                date.setDate(date.getDate() + 1);
            }

            function isValidEventDate(dateStr) {
                return dateStr && !isNaN(Date.parse(dateStr));
            }

            let invalidEvent = null;
            let invalidType = '';
            let invalidIndex = -1;
            ['arrivals', 'activities', 'departures'].forEach(function(type) {
                if (currentTrip[type] && Array.isArray(currentTrip[type])) {
                    currentTrip[type].forEach(function(event, idx) {
                        if (!isValidEventDate(event.date)) {
                            invalidEvent = event;
                            invalidType = type;
                            invalidIndex = idx;
                        }
                    });
                }
            });
            if (invalidEvent) {
                alert('Invalid or missing date for an event: "' + invalidEvent.name + '". Please correct it.');
                showEventCorrectionForm(invalidType, invalidEvent, invalidIndex);
                return;
            }

            const parseTime = function(t) {
                if (!t) return 0;
                const d = new Date('1970-01-01T' + t.replace(/(\d{1,2}):(\d{2}) ([AP]M)/, function(m, h, min, ampm) {
                    let hour = parseInt(h);
                    if (ampm === 'PM' && hour !== 12) hour += 12;
                    if (ampm === 'AM' && hour === 12) hour = 0;
                    return hour.toString().padStart(2, '0') + ':' + min;
                }) + ':00');
                return d.getTime();
            };

            dates.forEach(function(date) {
                const dateStr = date.getFullYear() + '-' +
                    String(date.getMonth() + 1).padStart(2, '0') + '-' +
                    String(date.getDate()).padStart(2, '0');
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                dayCard.innerHTML = '<div class="card-title">' + date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) + '</div>';

                let hasEvents = false;
                let eventsHtml = '';
                const mergedEvents = [];

                currentTrip.arrivals.filter(function(a) { return a.date === dateStr; }).forEach(function(a, idx) {
                    mergedEvents.push({ type: 'arrival', time: a.time, name: a.name, idx: idx, raw: a });
                });
                currentTrip.activities.filter(function(a) { return a.date === dateStr; }).forEach(function(a, idx) {
                    mergedEvents.push({ type: 'activity', time: a.startTime, endTime: a.endTime, name: a.name, idx: idx, raw: a });
                });
                currentTrip.departures.filter(function(d) { return d.date === dateStr; }).forEach(function(d, idx) {
                    mergedEvents.push({ type: 'departure', time: d.time, name: d.name, idx: idx, raw: d });
                });

                mergedEvents.sort(function(a, b) {
                    const aTime = parseTime(a.time);
                    const bTime = parseTime(b.time);
                    if (aTime !== bTime) return aTime - bTime;
                    if (a.type === 'activity' && b.type === 'activity') {
                        return parseTime(a.endTime) - parseTime(b.endTime);
                    }
                    return 0;
                });

                let arrivalIdx = 0, activityIdx = 0, departureIdx = 0;
                mergedEvents.forEach(function(ev) {
                    hasEvents = true;
                    if (ev.type === 'arrival') {
                        eventsHtml += '<div class="event arrival"><span>✈ ' + ev.time + ' &mdash; ' + ev.name + ' arrives</span><button class="event-delete-btn" title="Delete Arrival" onclick=\'deleteEventSorted("arrivals", "' + dateStr + '", ' + arrivalIdx + ')\'>&times;</button></div>';
                        arrivalIdx++;
                    } else if (ev.type === 'activity') {
                        eventsHtml += '<div class="event activity"><span>📅 ' + ev.time + (ev.endTime ? ' &ndash; ' + ev.endTime : '') + ' &mdash; ' + ev.name + '</span><button class="event-delete-btn" title="Delete Activity" onclick=\'deleteEventSorted("activities", "' + dateStr + '", ' + activityIdx + ')\'>&times;</button></div>';
                        activityIdx++;
                    } else if (ev.type === 'departure') {
                        eventsHtml += '<div class="event departure"><span>✈ ' + ev.time + ' &mdash; ' + ev.name + ' departs</span><button class="event-delete-btn" title="Delete Departure" onclick=\'deleteEventSorted("departures", "' + dateStr + '", ' + departureIdx + ')\'>&times;</button></div>';
                        departureIdx++;
                    }
                });

                if (!hasEvents) {
                    eventsHtml = '<div class="no-events">No events</div>';
                }
                dayCard.innerHTML += eventsHtml;
                calendar.appendChild(dayCard);
            });
        }

        // =========================================
        // EVENT CORRECTION FORM
        // =========================================
        function showEventCorrectionForm(type, event, index) {
            const form = document.getElementById('eventForm');
            const endTimeContainer = document.querySelector('.activity-only');
            const addButton = document.getElementById('addEventButton');
            const typeMap = { 'arrivals': 'Arrival', 'departures': 'Departure', 'activities': 'Activity' };
            const singularType = typeMap[type] || type.charAt(0).toUpperCase() + type.slice(1, -1);
            form.style.display = 'grid';
            endTimeContainer.style.display = type === 'activities' ? 'block' : 'none';
            addButton.textContent = 'Fix ' + singularType;

            const newForm = form.cloneNode(true);
            form.parentNode.replaceChild(newForm, form);

            document.getElementById('eventName').value = event.name || '';
            document.getElementById('eventDate').value = event.date || '';
            document.getElementById('eventTime').value = event.time || event.startTime || '';
            if (type === 'activities') {
                document.getElementById('eventEndTime').value = event.endTime || '';
            }
            setupDateAndTimePickers();

            document.getElementById('eventForm').onsubmit = async function(e) {
                e.preventDefault();
                const name = document.getElementById('eventName').value.trim();
                const date = document.getElementById('eventDate').value.trim();
                const time = document.getElementById('eventTime').value.trim();
                if (!name || !date || !time || isNaN(Date.parse(date))) {
                    alert('Please enter a valid name, date, and time.');
                    return;
                }
                if (type === 'arrivals') {
                    currentTrip.arrivals[index] = { name: name, date: date, time: time };
                } else if (type === 'departures') {
                    currentTrip.departures[index] = { name: name, date: date, time: time };
                } else if (type === 'activities') {
                    const endTime = document.getElementById('eventEndTime').value || null;
                    currentTrip.activities[index] = { name: name, date: date, startTime: time, endTime: endTime };
                }
                markTripEdit();
                document.getElementById('eventForm').reset();
                document.getElementById('eventForm').style.display = 'none';
                updateCalendar();
            };
        }

        // =========================================
        // INITIALIZATION
        // =========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                await loadData();
                lastSavedTripData = deepClone(tripData);

                if (typeof initializeDatePickers === 'function') {
                    initializeDatePickers();
                }

                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', function(e) {
                        e.preventDefault();
                        login();
                    });
                }

                const deleteBtn = document.getElementById('deleteTripBtn');
                if (deleteBtn) {
                    deleteBtn.onclick = deleteCurrentTrip;
                }

                const editTripModal = document.getElementById('editTripModal');
                if (editTripModal) {
                    editTripModal.addEventListener('show.bs.modal', function() {
                        const btn = document.getElementById('deleteTripBtn');
                        if (btn) btn.onclick = deleteCurrentTrip;
                    });
                }

                const backBtn = document.getElementById('backToTripsBtn');
                if (backBtn) {
                    backBtn.onclick = enhancedShowTripSelection;
                }

            } catch (error) {
                console.error('Error during initialization:', error);
            }
        });
    </script>
